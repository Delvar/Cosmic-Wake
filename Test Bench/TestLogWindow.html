<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UILog maxLines=5 – Fade 6th, Instant >6</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0f0f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui;
        }

        .game-container {
            position: relative;
            width: 820px;
            height: 520px;
            background: #16213e;
            border: 12px solid #0f3460;
            border-radius: 16px;
            overflow: hidden;
        }

        .ui-log {
            position: absolute;
            bottom: 38px;
            left: 38px;
            width: 390px;
            /* border: 2px solid #ff0000; */
            box-sizing: border-box;
        }

        .log-inner {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
            /* border: 2px solid #1eff00; */
            box-sizing: border-box;
        }

        .log-line {
            padding: 7px 14px;
            margin: 4px 0px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            font-size: 15.5px;
            color: #eee;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
            line-height: 1.3;
            height: 20px;
            display: flex;
        }

        .log-line.in {
            opacity: 1;
            align-items: start;
            transition: all 380ms ease-out;

            @starting-style {
                opacity: 0;
                height: 0px;
                margin-top: 0px;
                margin-bottom: 0px;
                padding-top: 0px;
                padding-bottom: 0px;
            }
        }

        .log-line.out {
            opacity: 0;
            height: 0px;
            margin-top: 0px;
            margin-bottom: 0px;
            padding-top: 0px;
            padding-bottom: 0px;
            align-items: end;
            transition: all 380ms ease-out;
        }

        button {
            position: absolute;
            top: 35px;
            right: 35px;
            padding: 14px 28px;
            font-size: 17px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="ui-log">
            <div class="log-inner" id="log-inner"></div>
        </div>
        <button id="add-btn">＋ Add Log Entry</button>
    </div>
</body>

</html>
