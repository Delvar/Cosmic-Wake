<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UILog maxLines=5 – Fade 6th, Instant >6</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0f0f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui;
        }

        .game-container {
            position: relative;
            width: 820px;
            height: 520px;
            background: #16213e;
            border: 12px solid #0f3460;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
        }

        .ui-log {
            position: absolute;
            bottom: 38px;
            left: 38px;
            width: 390px;
            height: 295px;
            background: rgba(10, 10, 25, 0.85);
            border-radius: 10px;
            padding: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .log-inner {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 0;
            height: 100%;
            transition: transform 360ms cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        .log-line {
            opacity: 0;
            transform: translateY(12px);
            padding: 7px 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            font-size: 15.5px;
            color: #eee;
            transition: all 380ms ease-out;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .log-line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .log-line.fading {
            opacity: 0;
            transition: opacity 520ms ease-out;
        }

        button {
            position: absolute;
            top: 35px;
            right: 35px;
            padding: 14px 28px;
            font-size: 17px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="ui-log">
            <div class="log-inner" id="log-inner"></div>
        </div>
        <button id="add-btn">＋ Add Log Entry</button>
    </div>
    <script>
        class UILog {
            constructor() {
                this.inner = document.getElementById('log-inner');
                this.maxLines = 8;
                this.maxAge = 5000;
                this.lineHeight = 34;
            }
            log(message) {
                const line = document.createElement('div');
                line.className = 'log-line';
                line.textContent = message;
                this.inner.style.transition = 'none';
                this.inner.style.transform = `translateY(${this.lineHeight}px)`;
                this.inner.appendChild(line);
                this.inner.offsetHeight;
                requestAnimationFrame(() => line.classList.add('show'));
                requestAnimationFrame(() => {
                    this.inner.style.transition = 'transform 360ms cubic-bezier(0.23,1,0.32,1)';
                    this.inner.style.transform = 'translateY(0)';
                });
                setTimeout(() => this._fadeOut(line), this.maxAge);
                this._trimExcess();
            }
            _trimExcess() {
                while (this.inner.children.length > this.maxLines + 1) {
                    const top = this.inner.children[0];
                    if (top) top.remove(); // instant delete for 7+
                }
                if (this.inner.children.length > this.maxLines) {
                    const sixth = this.inner.children[0];
                    if (sixth && !sixth.classList.contains('fading')) {
                        sixth.classList.add('fading');
                        setTimeout(() => { if (sixth.parentNode) sixth.remove(); }, 550);
                    }
                }
            }
            _fadeOut(line) {
                if (!line || !line.parentNode || line.classList.contains('fading')) return;
                line.classList.add('fading');
                setTimeout(() => { if (line.parentNode) line.remove(); }, 550);
            }
        }
        const logger = new UILog();
        const sampleMsgs = ["Health Potion +2", "Sword upgraded", "+85 Gold", "Goblin defeated", "Mana Crystal acquired", "Rare herb found", "Level Up!", "Critical strike", "Boots of Speed", "Enemy stunned"];
        let count = 1;
        document.getElementById('add-btn').onclick = () => {
            const text = sampleMsgs[Math.floor(Math.random() * sampleMsgs.length)];
            logger.log(text + ` #${count++}`);
        };
    </script>
</body>

</html>
