<!DOCTYPE html>
<html>

<head>
    <title>Cosmic Wake</title>
    <style>
        @import url("https://fonts.cdnfonts.com/css/century-gothic-paneuropean");

        body {
            margin: 0.0;
            padding: 0.0;
            /* Ensure no default padding */
            font-family: "Century Gothic Paneuropean", "Century Gothic", "CenturyGothic", "AppleGothic", sans-serif;
            overflow: hidden;
            /* Prevent scrollbars from canvas sizing */
        }

        /* Main camera: Full-screen */
        #mainCamera {
            position: absolute;
            margin: 0.0;
            padding: 0.0;
            top: 0.0;
            left: 0.0;
            width: 100vw;
            height: 100vh;
            background-color: black;
        }

        /* Target camera: Positioned, draggable */
        #targetCamera {
            position: absolute;
            margin: 0.0;
            padding: 0.0;
            outline: 2px solid white;
            border-radius: 20px;
            overflow: hidden;
            min-width: 100px;
            min-height: 100px;
            /* z-index: 4; */
            background-color: black;
            border: 1px black solid;
            transition: visibility 0.5s linear, opacity 0.5s ease-in-out;
        }

        /* Canvases: Fill div, stack with z-index */
        canvas {
            position: absolute;
            top: 0.0;
            left: 0.0;
            width: 100%;
            height: 100%;
            margin: 0.0;
            padding: 0.0;
            display: block;
        }

        /* Background canvases */
        #mainCameraBackground,
        #targetCameraBackground {
            /* z-index: 1; */
        }

        /* Foreground canvases */
        #mainCameraForeground,
        #targetCameraForeground {
            /* z-index: 2; */
        }

        #mainCameraHudOutline,
        #targetCameraHudOutline {
            /* z-index: 4; */
            mix-blend-mode: multiply;
            transition: visibility 0.5s linear, opacity 0.5s ease-in-out;
            /* Hide these when not using layered rendering */
            display: none;
        }

        #mainCameraHud,
        #targetCameraHud {
            /* z-index: 3; */
            mix-blend-mode: plus-lighter;
            transition: visibility 0.5s linear, opacity 0.5s ease-in-out;
            /* Hide these when not using layered rendering */
            display: none;
        }

        /* Show when layered rendering is enabled (via JS class) */
        body.layered-hud-mode #mainCameraHud,
        body.layered-hud-mode #mainCameraHudOutline,
        body.layered-hud-mode #targetCameraHud,
        body.layered-hud-mode #targetCameraHudOutline {
            display: block;
        }

        /* Optional: Draggable div (instead of canvas) */
        #targetCamera.draggable {
            cursor: move;
        }

        /* Resize handles */
        .resize-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            /* z-index: 5; */
        }

        .resize-handle.top-left {
            top: -4px;
            left: -4px;
            cursor: nwse-resize;
        }

        .resize-handle.top-right {
            top: -4px;
            right: -4px;
            cursor: nesw-resize;
        }

        .resize-handle.bottom-left {
            bottom: -4px;
            left: -4px;
            cursor: nesw-resize;
        }

        .resize-handle.bottom-right {
            bottom: -4px;
            right: -4px;
            cursor: nwse-resize;
        }

        /* Log list */
        .ui-log {
            position: absolute;
            bottom: 45px;
            left: 10px;
            min-width: 390px;
            /* border: 2px solid #ff0000; */
            box-sizing: border-box;
            /* z-index: 5; */
        }

        .log-inner {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
            /* border: 2px solid #1eff00; */
            box-sizing: border-box;
        }

        .log-line {
            /* padding: 7px 14px; */
            /* margin: 4px 0px; */
            /* background: rgba(75, 75, 75, 0.979); */
            /* border-radius: 6px; */
            /* font-size: 15px; */
            color: #eee;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
            /* line-height: 1.3; */
            height: 22px;
            line-height: 22px;
            display: flex;
        }

        .log-line.in {
            opacity: 1;
            align-items: start;
            transition: all 380ms ease-out;

            @starting-style {
                opacity: 0;
                height: 0px;
                margin-top: 0px;
                margin-bottom: 0px;
                padding-top: 0px;
                padding-bottom: 0px;
            }
        }

        .log-line.out {
            opacity: 0;
            height: 0px;
            margin-top: 0px;
            margin-bottom: 0px;
            padding-top: 0px;
            padding-bottom: 0px;
            align-items: end;
            transition: all 380ms ease-out;
        }

        /* Docking UI */
        #docking-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            outline: 2px solid white;
            border-radius: 20px;
            background-color: black;
            border: 1px black solid;
            transition: visibility 0.5s linear, opacity 0.5s ease-in-out;
            visibility: visible;
            opacity: 1;
            padding: 20px;
            text-align: center;
            /* z-index: 5; */
            color: #eee;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
        }

        #docking-ui.hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        #docking-ui button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            width: 100%;
        }

        #docking-ui button.hidden {
            display: none !important;
        }
    </style>
</head>

<body class="layered-hud-mode">
    <div id="mainCamera">
        <canvas id="mainCameraBackground"></canvas>
        <canvas id="mainCameraForeground"></canvas>
        <canvas id="mainCameraHud" style="visibility: visible; opacity: 1;"></canvas>
        <canvas id="mainCameraHudOutline" style="visibility: visible; opacity: 1;"></canvas>
    </div>
    <div id="targetCamera" style="  width: 200px; 
                                    height: 200px; 
                                    top: 40px; 
                                    right: 10px; 
                                    visibility: visible;
                                    opacity: 1;" draggable="true">
        <canvas id="targetCameraBackground"></canvas>
        <canvas id="targetCameraForeground"></canvas>
        <canvas id="targetCameraHud" style="visibility: visible; opacity: 1;"></canvas>
        <canvas id="targetCameraHudOutline" style="visibility: visible; opacity: 1;"></canvas>
        <span class="resize-handle top-left"></span>
        <span class="resize-handle top-right"></span>
        <span class="resize-handle bottom-left"></span>
        <span class="resize-handle bottom-right"></span>
    </div>
    <div class="ui-log">
        <div class="log-inner" id="log-inner"></div>
    </div>
    <div id="docking-ui" class="hidden">
        <span id="docking-ui-name"></span><br>
        <button id="docking-ui-takeoff">🚀︎ Take Off</button>
        <button id="docking-ui-repair">🛠︎ Repair Hull</button>
        <button id="docking-ui-start-mining">⛏︎ Start Mining</button>
        <button id="docking-ui-stop-mining">⛏︎ Stop Mining</button>
    </div>
    <!-- <button id="add-btn">＋ Add Log Entry</button> -->
    <script type="module" src="src/core/game.js"></script>
</body>

</html>
